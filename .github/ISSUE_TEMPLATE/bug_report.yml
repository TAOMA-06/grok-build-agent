name: Bug report
description: Report a reproducible Grok Build Desktop problem
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Do not include secrets or private source code. Use private vulnerability reporting for security issues.
  - type: input
    id: version
    attributes:
      label: Version and macOS
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
