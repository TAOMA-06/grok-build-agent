name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    name: Pre-release quality
    uses: ./.github/workflows/ci.yml

  build-macos:
    name: Build macOS
    needs: [quality]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - name: Build app (host arch)
        working-directory: apps/desktop
        run: npm run app:build
        env:
          # Optional Apple signing — set repository secrets to enable.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Collect artifacts
        run: |
          mkdir -p dist/release
          find apps/desktop/src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.app' \) -print || true
          cp -R apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg dist/release/ 2>/dev/null || true
          APP_PATH=$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -1)
          if [[ -n "$APP_PATH" ]]; then
            NAME=$(basename "$APP_PATH" .app)
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/release/${NAME}.zip"
          fi
          ls -lah dist/release || true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/release/*
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    name: Signing reminder
    runs-on: ubuntu-latest
    needs: [build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Notarization checklist
        run: |
          echo "Community builds are unsigned by default."
          echo "For Gatekeeper-friendly distribution set Apple secrets:"
          echo "  APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY"
          echo "  APPLE_ID, APPLE_PASSWORD (app-specific), APPLE_TEAM_ID"
          echo "Then enable notarization stapling in Tauri bundler config."
