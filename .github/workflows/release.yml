name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    name: Pre-release quality
    uses: ./.github/workflows/ci.yml

  signing-preflight:
    name: Require Apple signing and notarization credentials
    needs: [quality]
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Refuse an unsigned public release
        shell: bash
        run: |
          required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "Refusing to publish an unsigned or unnotarized build."
            echo "Missing repository secrets: ${missing[*]}"
            exit 1
          fi

  build-macos:
    name: Build signed universal macOS release
    needs: [signing-preflight]
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build signed and notarized universal app
        working-directory: apps/desktop
        run: npm run app:build:universal

      - name: Verify signing, Gatekeeper assessment, and notarization ticket
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE=apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          APP_PATH=$(find "$BUNDLE/macos" -maxdepth 1 -type d -name '*.app' -print -quit)
          DMG_PATH=$(find "$BUNDLE/dmg" -maxdepth 1 -type f -name '*.dmg' -print -quit)
          test -n "$APP_PATH"
          test -n "$DMG_PATH"
          HOST_PATH="$APP_PATH/Contents/MacOS/grok-build-agent-host"
          test -x "$HOST_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -q 'Authority=Developer ID Application'
          lipo -archs "$HOST_PATH" | grep -q arm64
          lipo -archs "$HOST_PATH" | grep -q x86_64
          codesign -d --entitlements :- "$APP_PATH/Contents/MacOS/grok-build-desktop" 2>&1 | grep -q "$APPLE_TEAM_ID.com.grokbuilddesktop.community.shared"
          codesign -d --entitlements :- "$HOST_PATH" 2>&1 | grep -q "$APPLE_TEAM_ID.com.grokbuilddesktop.community.shared"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Create SBOM
        uses: anchore/sbom-action@v0
        with:
          path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          format: spdx-json
          output-file: dist/release/grok-build-desktop.sbom.spdx.json

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE=apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          mkdir -p dist/release
          cp "$BUNDLE"/dmg/*.dmg dist/release/
          APP_PATH=$(find "$BUNDLE/macos" -maxdepth 1 -type d -name '*.app' -print -quit)
          NAME=$(basename "$APP_PATH" .app)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/release/${NAME}.zip"
          cd dist/release
          shasum -a 256 ./*.dmg ./*.zip ./*.spdx.json > SHA256SUMS
          find . -maxdepth 1 -type f -print

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-notarized-release
          path: dist/release/*
          if-no-files-found: error


  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-release'
          path: dist/release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
