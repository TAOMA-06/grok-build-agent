name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - name: Build app (DMG + .app)
        working-directory: apps/desktop
        run: npm run app:build

      - name: Collect artifacts
        run: |
          mkdir -p dist/release
          find apps/desktop/src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.app' \) -print || true
          cp -R apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg dist/release/ 2>/dev/null || true
          # Zip .app for users who prefer a zip
          APP_PATH=$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -1)
          if [[ -n "$APP_PATH" ]]; then
            NAME=$(basename "$APP_PATH" .app)
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/release/${NAME}.zip"
          fi
          ls -lah dist/release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/release/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-notes:
    name: Release notes
    runs-on: ubuntu-latest
    needs: [build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Reminder
        run: |
          echo "Attach any extra notes about Grok CLI requirement in the release description."
          echo "Users need Grok Build CLI installed and authenticated separately."
