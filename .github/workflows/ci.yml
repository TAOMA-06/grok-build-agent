name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run check
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  rust:
    name: Rust (macOS v1)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: fmt
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        working-directory: apps/desktop/src-tauri
        run: cargo test --workspace

  rust-audit:
    name: Rust dependency audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Audit Rust dependencies
        working-directory: apps/desktop/src-tauri
        run: cargo audit

  harness:
    name: Harness plugin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate harness if grok available
        run: |
          if command -v grok >/dev/null 2>&1; then
            grok plugin validate harness
          else
            echo "grok CLI not on runner; verifying bundled manifest instead"
            test -f harness/plugin.json
          fi

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: apps/desktop
          format: spdx-json
          output-file: grok-build-desktop.sbom.spdx.json
          # CI runs on both branches and release tags with read-only contents.
          # The release workflow publishes its signed bundle SBOM separately.
          upload-release-assets: false
      - uses: actions/upload-artifact@v4
        with:
          name: source-sbom
          path: grok-build-desktop.sbom.spdx.json
          if-no-files-found: error
